<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/catalogo" class="logo">🎬 DVD Store</a>
  </div>

  <div class="navbar-menu">
    <a routerLink="/catalogo" routerLinkActive="active" class="nav-link">Catalogo</a>

    <ng-container *ngIf="isCliente">
      <a routerLink="/carrello" routerLinkActive="active" class="nav-link cart-link">
        🛒 Carrello
        <span class="cart-badge" *ngIf="(cartItemCount$ | async) as count">{{ count }}</span>
      </a>
    </ng-container>

    <div class="auth-section">
      <ng-container *ngIf="!isLoggedIn">
        <button (click)="register()" class="btn-secondary-outline">Registrati</button>
        <button (click)="login()" class="btn-primary-outline">Accedi</button>
      </ng-container>

      <ng-container *ngIf="isLoggedIn">
        <a routerLink="/profilo" routerLinkActive="active" class="nav-link">Profilo</a>
        <button (click)="logout()" class="btn-text text-danger">Esci</button>
      </ng-container>
    </div>
  </div>
</nav>
