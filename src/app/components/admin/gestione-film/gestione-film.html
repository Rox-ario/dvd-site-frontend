<div class="gestione-film-container">

  <header class="admin-header">
    <h1>Gestione Catalogo Film</h1>
    <button class="btn-primary" (click)="apriFormCreazione()" *ngIf="!mostraForm">
      + Aggiungi Nuovo Film
    </button>
  </header>

  <div class="table-container" *ngIf="!mostraForm">
    <table class="admin-table">
      <thead>
      <tr>
        <th>ID</th>
        <th>Titolo</th>
        <th>Prezzo</th>
        <th>Stock</th>
        <th>Stato</th>
        <th>Azioni</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let film of filmList" [class.disabled-row]="!film.isAttivo">
        <td>{{ film.idFilm }}</td>
        <td class="fw-bold">{{ film.titolo }} <span class="badge-anno">{{ film.anno }}</span></td>
        <td>{{ film.prezzo | currency:'EUR':'symbol':'1.2-2' }}</td>
        <td>
          <span [class.text-danger]="film.stock === 0">{{ film.stock }} pz.</span>
        </td>
        <td>
            <span class="status-badge" [class.attivo]="film.isAttivo" [class.disattivo]="!film.isAttivo">
              {{ film.isAttivo ? 'In Vendita' : 'Disattivato' }}
            </span>
        </td>
        <td class="actions-cell">
          <button class="btn-icon text-primary" (click)="apriFormModifica(film)">✎</button>
          <button class="btn-icon text-danger" *ngIf="film.isAttivo" (click)="eliminaFilm(film.idFilm, film.titolo)">🗑️</button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="form-container card" *ngIf="mostraForm">
    <h2>{{ filmInModificaId ? 'Modifica Film' : 'Nuovo Film' }}</h2>

    <form [formGroup]="filmForm" (ngSubmit)="salvaFilm()">

      <div class="form-grid">
        <div class="form-group span-2">
          <label>Titolo</label>
          <input type="text" formControlName="titolo">
        </div>

        <div class="form-group">
          <label>Anno</label>
          <input type="number" formControlName="anno">
        </div>

        <div class="form-group">
          <label>Durata (min)</label>
          <input type="number" formControlName="durataMinuti">
        </div>

        <div class="form-group">
          <label>Prezzo (€)</label>
          <input type="number" step="0.01" formControlName="prezzo">
        </div>

        <div class="form-group">
          <label>Stock Dispo.</label>
          <input type="number" formControlName="stock">
        </div>

        <div class="form-group span-2">
          <label>URL Immagine</label>
          <input type="text" formControlName="urlImmagine" placeholder="https://...">
        </div>

        <div class="form-group span-2">
          <label>Trama</label>
          <textarea formControlName="trama" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label>Generi (Ctrl+Click per multipli)</label>
          <select multiple formControlName="idGeneri" class="multi-select">
            <option *ngFor="let g of generi" [value]="g.id">{{ g.nome }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Registi</label>
          <select multiple formControlName="idRegisti" class="multi-select">
            <option *ngFor="let r of registi" [value]="r.id">{{ r.nome }} {{ r.cognome }}</option>
          </select>
        </div>

        <div class="form-group span-2">
          <label>Attori</label>
          <select multiple formControlName="idAttori" class="multi-select">
            <option *ngFor="let a of attori" [value]="a.id">{{ a.nome }} {{ a.cognome }}</option>
          </select>
        </div>
      </div>

      <div class="form-actions mt-4">
        <button type="button" class="btn-outline" (click)="annulla()" [disabled]="isLoading">Annulla</button>
        <button type="submit" class="btn-primary" [disabled]="filmForm.invalid || isLoading">
          {{ isLoading ? 'Salvataggio...' : 'Salva Film' }}
        </button>
      </div>
    </form>
  </div>
</div>
